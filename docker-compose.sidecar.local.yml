services:
  au_sys_storage_service:
    build:
      context: .
      dockerfile: Dockerfile
    image: au_sys_storage_service:local
    container_name: au_sys_storage_service
    restart: unless-stopped
    environment:
      STORAGE_ENVIRONMENT: local
    ports:
      - "8082:8082"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/healthz', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
